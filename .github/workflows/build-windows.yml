name: Build Live Tools Windows

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

env:
  PLAYWRIGHT_BROWSERS_PATH: "0"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r live-web/requirements.txt
          pip install -r live-sku-price-audit/requirements.txt
          pip install -r live-promotion-binding/requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium
        run: |
          playwright install chromium

      - name: Run unit tests
        shell: pwsh
        run: |
          Push-Location live-promotion-binding
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          Push-Location live-web
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          Push-Location live-sku-price-audit
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build Live Tools Web with PyInstaller
        shell: pwsh
        run: |
          $webApp = "live-web/app.py"
          $webTemplates = "live-web/templates"
          $bindingAssets = "live-promotion-binding/assets"
          $bindingPackage = "live-promotion-binding/promotion_binding"
          $priceUtils = "live-sku-price-audit/utils"

          pyinstaller --noconfirm --onedir --console `
            --name "Live-Tools-Web" `
            --paths "live-promotion-binding" `
            --paths "live-sku-price-audit" `
            --collect-all playwright `
            --collect-all flask `
            --collect-all jinja2 `
            --collect-all werkzeug `
            --collect-all click `
            --collect-all itsdangerous `
            --collect-all markupsafe `
            --hidden-import openpyxl `
            --hidden-import PIL `
            --hidden-import promotion_binding.service `
            --hidden-import utils.audit_runner `
            --hidden-import utils.browser_manager `
            --hidden-import utils.excel_handler `
            --hidden-import utils.jd_crawler `
            --add-data "$webTemplates;live-web/templates" `
            --add-data "$bindingAssets;live-promotion-binding/assets" `
            --add-data "$bindingPackage;live-promotion-binding/promotion_binding" `
            --add-data "$priceUtils;live-sku-price-audit/utils" `
            $webApp

      - name: Copy launcher and runtime folders
        shell: pwsh
        run: |
          $distPath = "dist/Live-Tools-Web"
          if (-not (Test-Path $distPath)) {
            Write-Host "Build output not found: $distPath"
            exit 1
          }

          Copy-Item -Path "启动直播工具.bat" -Destination (Join-Path $distPath "启动直播工具.bat") -Force
          New-Item -ItemType Directory -Path (Join-Path $distPath "runtime") -Force | Out-Null

      - name: Verify build output
        shell: pwsh
        run: |
          $distPath = "dist/Live-Tools-Web"
          $required = @(
            "Live-Tools-Web.exe",
            "启动直播工具.bat",
            "live-web/templates",
            "live-promotion-binding/assets",
            "live-promotion-binding/promotion_binding",
            "live-sku-price-audit/utils"
          )

          foreach ($item in $required) {
            $path = Join-Path $distPath $item
            if (-not (Test-Path $path)) {
              Write-Host "Missing required build item: $item"
              exit 1
            }
          }

      - name: Compress output
        shell: pwsh
        run: |
          $source = "dist/Live-Tools-Web"
          $dest = "dist/Live-Tools-Windows.zip"
          Compress-Archive -Path $source -DestinationPath $dest -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Live-Tools-Windows
          path: dist/Live-Tools-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Live-Tools-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
