name: Build Windows EXE

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium to local dir
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "0"
          playwright install chromium

      - name: Build Web GUI with PyInstaller
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onedir --console `
            --name "SKU-Price-Audit-Web" `
            --collect-all playwright `
            --collect-all flask `
            --collect-all jinja2 `
            --collect-all werkzeug `
            --collect-all click `
            --collect-all itsdangerous `
            --collect-all markupsafe `
            --hidden-import openpyxl `
            --hidden-import PIL `
            --add-data "templates;templates" `
            --add-data "config.py;." `
            --add-data "utils;utils" `
            app.py

      - name: Copy additional files
        shell: pwsh
        run: |
          # 创建 input 目录（空目录）
          New-Item -ItemType Directory -Path "dist/SKU-Price-Audit-Web/input" -Force
          # 复制启动脚本
          Copy-Item -Path "start_web.bat" -Destination "dist/SKU-Price-Audit-Web/启动测价工具.bat" -Force

      - name: Compress output
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/SKU-Price-Audit-Web" -DestinationPath "dist/SKU-Price-Audit-Web-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SKU-Price-Audit-Web-Windows
          path: dist/SKU-Price-Audit-Web-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SKU-Price-Audit-Web-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
