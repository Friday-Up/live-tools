name: Build Windows EXE

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium to local dir
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "0"
          playwright install chromium

      - name: Build Web GUI with PyInstaller
        shell: pwsh
        run: |
          $templatePath = Join-Path $PWD "templates"
          $configPath = Join-Path $PWD "config.py"
          $utilsPath = Join-Path $PWD "utils"

          pyinstaller --noconfirm --onedir --console `
            --name "SKU-Price-Audit-Web" `
            --collect-all playwright `
            --collect-all flask `
            --collect-all jinja2 `
            --collect-all werkzeug `
            --collect-all click `
            --collect-all itsdangerous `
            --collect-all markupsafe `
            --hidden-import openpyxl `
            --hidden-import PIL `
            --add-data "$templatePath;templates" `
            --add-data "$configPath;." `
            --add-data "$utilsPath;utils" `
            app.py

      - name: Verify build output
        shell: pwsh
        run: |
          Write-Host "=== 检查打包输出 ==="
          $distPath = "dist/SKU-Price-Audit-Web"
          if (Test-Path $distPath) {
            Write-Host "✅ 打包目录存在"
            Get-ChildItem $distPath -Recurse | Select-Object -First 20
          } else {
            Write-Host "❌ 打包目录不存在"
          }

          $templatePath = Join-Path $distPath "templates"
          if (Test-Path $templatePath) {
            Write-Host "✅ templates 目录存在"
          } else {
            Write-Host "❌ templates 目录不存在"
          }

      - name: Copy additional files
        shell: pwsh
        run: |
          # 确保 templates 目录存在（如果不存在则复制）
          $destTemplatePath = "dist/SKU-Price-Audit-Web/templates"
          if (-not (Test-Path $destTemplatePath)) {
            Copy-Item -Path "templates" -Destination $destTemplatePath -Recurse -Force
            Write-Host "✅ 复制 templates 目录"
          }

          # 确保 config.py 存在
          $destConfigPath = "dist/SKU-Price-Audit-Web/config.py"
          if (-not (Test-Path $destConfigPath)) {
            Copy-Item -Path "config.py" -Destination $destConfigPath -Force
            Write-Host "✅ 复制 config.py"
          }

          # 确保 utils 目录存在
          $destUtilsPath = "dist/SKU-Price-Audit-Web/utils"
          if (-not (Test-Path $destUtilsPath)) {
            Copy-Item -Path "utils" -Destination $destUtilsPath -Recurse -Force
            Write-Host "✅ 复制 utils 目录"
          }

          # 创建 input 目录（空目录）
          New-Item -ItemType Directory -Path "dist/SKU-Price-Audit-Web/input" -Force

          # 复制启动脚本
          Copy-Item -Path "start_web.bat" -Destination "dist/SKU-Price-Audit-Web/启动测价工具.bat" -Force

      - name: Compress output
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/SKU-Price-Audit-Web" -DestinationPath "dist/SKU-Price-Audit-Web-Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SKU-Price-Audit-Web-Windows
          path: dist/SKU-Price-Audit-Web-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SKU-Price-Audit-Web-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
