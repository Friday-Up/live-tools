name: Build Windows EXE

on:
  push:
    branches: [master, main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium to local dir
        run: |
          $env:PLAYWRIGHT_BROWSERS_PATH = "0"
          playwright install chromium

      - name: Build Web GUI with PyInstaller
        shell: pwsh
        run: |
          # 使用绝对路径
          $templatePath = Join-Path $PWD "templates"
          $configPath = Join-Path $PWD "config.py"
          $utilsPath = Join-Path $PWD "utils"

          Write-Host "=== 构建参数 ==="
          Write-Host "模板路径: $templatePath"
          Write-Host "配置路径: $configPath"
          Write-Host "工具路径: $utilsPath"

          pyinstaller --noconfirm --onedir --console `
            --name "SKU-Price-Audit-Web" `
            --collect-all playwright `
            --collect-all flask `
            --collect-all jinja2 `
            --collect-all werkzeug `
            --collect-all click `
            --collect-all itsdangerous `
            --collect-all markupsafe `
            --hidden-import openpyxl `
            --hidden-import PIL `
            --add-data "$templatePath;templates" `
            --add-data "$configPath;." `
            --add-data "$utilsPath;utils" `
            app.py

      - name: Verify build output
        shell: pwsh
        run: |
          Write-Host "=== 检查打包输出 ==="
          $distPath = "dist/SKU-Price-Audit-Web"

          if (Test-Path $distPath) {
            Write-Host "✅ 打包目录存在: $distPath"
            Write-Host "目录内容:"
            Get-ChildItem $distPath | ForEach-Object { Write-Host "  $($_.Name)" }
          } else {
            Write-Host "❌ 打包目录不存在: $distPath"
            exit 1
          }

          # 检查关键文件
          $templatePath = Join-Path $distPath "templates"
          $configPath = Join-Path $distPath "config.py"
          $utilsPath = Join-Path $distPath "utils"

          if (Test-Path $templatePath) {
            Write-Host "✅ templates 目录存在"
            Get-ChildItem $templatePath | ForEach-Object { Write-Host "    $($_.Name)" }
          } else {
            Write-Host "❌ templates 目录不存在"
          }

          if (Test-Path $configPath) {
            Write-Host "✅ config.py 存在"
          } else {
            Write-Host "❌ config.py 不存在"
          }

          if (Test-Path $utilsPath) {
            Write-Host "✅ utils 目录存在"
          } else {
            Write-Host "❌ utils 目录不存在"
          }

      - name: Copy additional files
        shell: pwsh
        run: |
          $distPath = "dist/SKU-Price-Audit-Web"

          # 确保 templates 目录存在
          $destTemplatePath = Join-Path $distPath "templates"
          if (-not (Test-Path $destTemplatePath)) {
            Copy-Item -Path "templates" -Destination $destTemplatePath -Recurse -Force
            Write-Host "✅ 复制 templates 目录"
          }

          # 确保 config.py 存在
          $destConfigPath = Join-Path $distPath "config.py"
          if (-not (Test-Path $destConfigPath)) {
            Copy-Item -Path "config.py" -Destination $destConfigPath -Force
            Write-Host "✅ 复制 config.py"
          }

          # 确保 utils 目录存在
          $destUtilsPath = Join-Path $distPath "utils"
          if (-not (Test-Path $destUtilsPath)) {
            Copy-Item -Path "utils" -Destination $destUtilsPath -Recurse -Force
            Write-Host "✅ 复制 utils 目录"
          }

          # 创建 input 目录（空目录）
          $inputPath = Join-Path $distPath "input"
          New-Item -ItemType Directory -Path $inputPath -Force
          Write-Host "✅ 创建 input 目录"

          # 复制启动脚本
          Copy-Item -Path "start_web.bat" -Destination (Join-Path $distPath "启动测价工具.bat") -Force
          Write-Host "✅ 复制启动脚本"

      - name: Compress output
        shell: pwsh
        run: |
          $source = "dist/SKU-Price-Audit-Web"
          $dest = "dist/SKU-Price-Audit-Web-Windows.zip"
          Compress-Archive -Path $source -DestinationPath $dest -Force
          Write-Host "✅ 压缩完成: $dest"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SKU-Price-Audit-Web-Windows
          path: dist/SKU-Price-Audit-Web-Windows.zip
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SKU-Price-Audit-Web-Windows.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
