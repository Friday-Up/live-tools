name: Build Live Tools Windows

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: write

env:
  PLAYWRIGHT_BROWSERS_PATH: "0"
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r live-web/requirements.txt
          pip install -r live-sku-price-audit/requirements.txt
          pip install -r live-promotion-binding/requirements.txt
          pip install -r live-room-creator/requirements.txt
          pip install -r live-red-rain-creator/requirements.txt
          pip install -r live-bigscreen-capture/requirements.txt
          pip install -r product-selection-agent/requirements.txt
          pip install pyinstaller

      - name: Install Playwright Chromium
        run: |
          playwright install chromium --no-shell

      - name: Smoke test Playwright Chromium channel
        run: |
          python -c "from playwright.sync_api import sync_playwright; p = sync_playwright().start(); b = p.chromium.launch(headless=True, channel='chromium'); b.close(); p.stop()"

      - name: Run unit tests
        shell: pwsh
        run: |
          Push-Location live-promotion-binding
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          Push-Location live-web
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          Push-Location live-sku-price-audit
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          Push-Location live-room-creator
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          Push-Location live-red-rain-creator
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          Push-Location live-bigscreen-capture
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          Push-Location product-selection-agent
          python -m unittest discover -s tests -p "test_*.py" -v
          Pop-Location

          python -m unittest discover -s tests -p "test_*.py" -v

      - name: Build standalone updater
        shell: pwsh
        run: |
          pyinstaller --noconfirm --onefile --console `
            --name "Live-Tools-Updater" `
            "live-updater/updater.py"

      - name: Build Live Tools Web with PyInstaller
        shell: pwsh
        run: |
          $webApp = "live-web/app.py"
          $webTemplates = "live-web/templates"
          $bindingAssets = "live-promotion-binding/assets"
          $bindingPackage = "live-promotion-binding/promotion_binding"
          $priceUtils = "live-sku-price-audit/utils"
          $priceTemplate = "live-sku-price-audit/input/点菜清单模板.xlsx"
          $roomCreatorPackage = "live-room-creator/room_creator"
          $roomCreatorTemplate = "live-room-creator/input/直播间创建模板.xlsx"
          $redRainCreatorPackage = "live-red-rain-creator/red_rain_creator"
          $redRainTemplate = "live-red-rain-creator/input/红包雨创建模板.xlsx"
          $bigscreenPackage = "live-bigscreen-capture/bigscreen_capture"
          $productSelectionPackage = "product-selection-agent/product_selection_agent"

          pyinstaller --noconfirm --onedir --console `
            --name "Live-Tools-Web" `
            --contents-directory "." `
            --paths "live-promotion-binding" `
            --paths "live-sku-price-audit" `
            --paths "live-room-creator" `
            --paths "live-red-rain-creator" `
            --paths "live-bigscreen-capture" `
            --paths "product-selection-agent" `
            --collect-all playwright `
            --collect-all flask `
            --collect-all jinja2 `
            --collect-all werkzeug `
            --collect-all click `
            --collect-all itsdangerous `
            --collect-all markupsafe `
            --hidden-import openpyxl `
            --hidden-import PIL `
            --hidden-import promotion_binding.service `
            --hidden-import utils.audit_runner `
            --hidden-import utils.browser_manager `
            --hidden-import utils.excel_handler `
            --hidden-import utils.jd_crawler `
            --hidden-import room_creator `
            --hidden-import room_creator.browser `
            --hidden-import room_creator.excel_reader `
            --hidden-import room_creator.runner `
            --hidden-import room_creator.validator `
            --hidden-import room_creator.report_writer `
            --hidden-import room_creator.models `
            --hidden-import red_rain_creator `
            --hidden-import red_rain_creator.browser `
            --hidden-import red_rain_creator.excel_reader `
            --hidden-import red_rain_creator.runner `
            --hidden-import red_rain_creator.validator `
            --hidden-import red_rain_creator.report_writer `
            --hidden-import red_rain_creator.models `
            --hidden-import bigscreen_capture `
            --hidden-import bigscreen_capture.browser `
            --hidden-import bigscreen_capture.service `
            --hidden-import bigscreen_capture.capture_steps `
            --hidden-import product_selection_agent `
            --hidden-import product_selection_agent.config `
            --hidden-import product_selection_agent.fetcher `
            --hidden-import product_selection_agent.parser `
            --hidden-import product_selection_agent.recommender `
            --hidden-import product_selection_agent.runtime `
            --hidden-import product_selection_agent.selector `
            --hidden-import product_selection_agent.service `
            --add-data "$webTemplates;live-web/templates" `
            --add-data "$bindingAssets;live-promotion-binding/assets" `
            --add-data "$bindingPackage;live-promotion-binding/promotion_binding" `
            --add-data "$priceUtils;live-sku-price-audit/utils" `
            --add-data "$priceTemplate;live-sku-price-audit/input" `
            --add-data "$roomCreatorPackage;live-room-creator/room_creator" `
            --add-data "$roomCreatorTemplate;live-room-creator/input" `
            --add-data "$redRainCreatorPackage;live-red-rain-creator/red_rain_creator" `
            --add-data "$redRainTemplate;live-red-rain-creator/input" `
            --add-data "$bigscreenPackage;live-bigscreen-capture/bigscreen_capture" `
            --add-data "$productSelectionPackage;product-selection-agent/product_selection_agent" `
            $webApp

      - name: Copy launcher and runtime folders
        shell: pwsh
        run: |
          $distPath = "dist/Live-Tools-Web"
          if (-not (Test-Path $distPath)) {
            Write-Host "Build output not found: $distPath"
            exit 1
          }

          Copy-Item -Path "启动直播工具.bat" -Destination (Join-Path $distPath "启动直播工具.bat") -Force
          Copy-Item -Path "dist/Live-Tools-Updater.exe" -Destination (Join-Path $distPath "Live-Tools-Updater.exe") -Force
          New-Item -ItemType Directory -Path (Join-Path $distPath "runtime") -Force | Out-Null
          New-Item -ItemType Directory -Path (Join-Path $distPath "product-selection-agent") -Force | Out-Null
          Copy-Item -Path "product-selection-agent/model-config.example.json" -Destination (Join-Path $distPath "product-selection-agent/model-config.example.json") -Force

      - name: Verify build output
        shell: pwsh
        run: |
          $distPath = "dist/Live-Tools-Web"
          $required = @(
            "Live-Tools-Web.exe",
            "Live-Tools-Updater.exe",
            "启动直播工具.bat",
            "live-web/templates",
            "live-promotion-binding/assets",
            "live-promotion-binding/promotion_binding",
            "live-sku-price-audit/utils",
            "live-sku-price-audit/input/点菜清单模板.xlsx",
            "live-room-creator/room_creator",
            "live-room-creator/input/直播间创建模板.xlsx",
            "live-red-rain-creator/red_rain_creator",
            "live-red-rain-creator/input/红包雨创建模板.xlsx",
            "live-bigscreen-capture/bigscreen_capture",
            "product-selection-agent/product_selection_agent",
            "product-selection-agent/model-config.example.json"
          )

          foreach ($item in $required) {
            $path = Join-Path $distPath $item
            if (-not (Test-Path $path)) {
              Write-Host "Missing required build item: $item"
              exit 1
            }
          }

          $requiredFiles = @(
            "Live-Tools-Web.exe",
            "Live-Tools-Updater.exe",
            "启动直播工具.bat",
            "live-sku-price-audit/input/点菜清单模板.xlsx",
            "live-room-creator/input/直播间创建模板.xlsx",
            "live-red-rain-creator/input/红包雨创建模板.xlsx"
          )
          foreach ($item in $requiredFiles) {
            $path = Join-Path $distPath $item
            if (-not (Test-Path $path -PathType Leaf)) {
              Write-Host "Required build file is missing or is not a file: $item"
              exit 1
            }
          }

          $testDirs = Get-ChildItem -Path $distPath -Recurse -Directory -Filter "tests" -ErrorAction SilentlyContinue
          if ($testDirs) {
            Write-Host "Test directories must not be included in the Windows package:"
            $testDirs | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          $privateConfigs = Get-ChildItem -Path $distPath -Recurse -File -Filter "model-config.local.json" -ErrorAction SilentlyContinue
          if ($privateConfigs) {
            Write-Host "Private model config must not be included in the Windows package:"
            $privateConfigs | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

          $headlessShellDirs = Get-ChildItem -Path $distPath -Recurse -Directory -ErrorAction SilentlyContinue |
            Where-Object { $_.Name -like "chromium_headless_shell-*" -or $_.Name -eq "chrome-headless-shell" }
          if ($headlessShellDirs) {
            Write-Host "Headless Shell must not be included in the Windows package:"
            $headlessShellDirs | ForEach-Object { Write-Host $_.FullName }
            exit 1
          }

      - name: Compress output
        shell: pwsh
        run: |
          $source = "dist/Live-Tools-Web"
          $dest = "dist/Live-Tools-Windows.zip"
          Compress-Archive -Path $source -DestinationPath $dest -Force

      - name: Generate update manifest
        shell: pwsh
        run: |
          $version = python -c "import sys; sys.path.insert(0, 'live-web'); import config; print(config.LIVE_TOOLS_APP_VERSION)"
          if ($env:GITHUB_REF -like "refs/tags/v*") {
            $tagVersion = $env:GITHUB_REF_NAME.TrimStart("v")
            if ($tagVersion -ne $version) {
              Write-Host "Release tag $tagVersion does not match app version $version"
              exit 1
            }
          }
          $tag = "v$version"
          $sha256 = (Get-FileHash "dist/Live-Tools-Windows.zip" -Algorithm SHA256).Hash.ToLower()
          $manifest = [ordered]@{
            version = $version
            asset_url = "https://github.com/Friday-Up/live-tools/releases/download/$tag/Live-Tools-Windows.zip"
            sha256 = $sha256
            release_url = "https://github.com/Friday-Up/live-tools/releases/tag/$tag"
            notes = ""
          } | ConvertTo-Json
          Set-Content -Path "dist/live-tools-update.json" -Value $manifest -Encoding utf8

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Live-Tools-Windows
          path: |
            dist/Live-Tools-Windows.zip
            dist/live-tools-update.json
          retention-days: 30

      - name: Upload to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            dist/Live-Tools-Windows.zip
            dist/live-tools-update.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify and publish Windows release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $assets = gh release view $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --json assets --jq '.assets[].name'
          if (-not ($assets -contains "Live-Tools-Windows.zip") -or -not ($assets -contains "live-tools-update.json")) {
            Write-Host "Refusing to publish release without both Windows update assets"
            exit 1
          }
          gh release edit $env:GITHUB_REF_NAME --repo $env:GITHUB_REPOSITORY --draft=false --latest
